# jcard-claude.toml — Claude Code agent sandbox config
# Launch: mb up --config agent-sandbox/jcard-claude.toml

mixtape = "agent-workbench:latest"

[resources]
cpus   = 2
memory = "4GiB"
disk   = "10GiB"

[network]
mode = "nat"

[[shared]]
host  = "./"
guest = "/home/agent/workspace"

[secrets]
ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY}"
TASK_ID           = "${TASK_ID}"    # JIRA issue key, e.g. MYPROJ-42

# TOKEN MONITOR STUB (deferred):
# ANTHROPIC_BASE_URL = "http://localhost:9999"  # proxy for token counting

[agent]
harness = "claude-code"
prompt  = ""                         # populated by exomonad at launch from AGENTS.md
workdir = "/home/agent/workspace"
