# jcard.toml — masterblaster sandbox config template
#
# Copy this to your workspace root and fill in the project-specific fields.
# Launch with: masterblaster up --config jcard.toml
#
# Schema reference: https://stereos.ai/reference/jcard-schema/

mixtape = "opencode-mixtape:latest"

# Mount your workspace into the sandbox (read/write)
[[shared]]
host  = "/home/goya/workspaces/my-project"  # ← update to actual path
guest = "/workspace"

# Mount agent configs read-only so agents can read provision.sh but not modify it
[[shared]]
host     = "/home/goya/agent-configs"
guest    = "/agent-configs"
readonly = true

[[agents]]
name    = "my-project"                       # ← update to project name
harness = "claude-code"
type    = "sandboxed"
workdir = "/workspace"
restart = "no"

extra_packages = [
  "bun",       # JS/TS runtime
  "ast-grep",  # structural code search
  "jq",
  "ripgrep",
  "fd",
]

[agents.env]
ANTHROPIC_API_KEY = "${ANTHROPIC_API_KEY}"
GEMINI_API_KEY    = "${GEMINI_API_KEY}"
